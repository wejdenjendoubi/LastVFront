<div class="not-found-wrapper">

  <!-- Animated background -->
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- Floating particles -->
  <div class="particles">
    <span class="star star-1">★</span>
    <span class="star star-2">✦</span>
    <span class="star star-3">★</span>
    <span class="dot dot-1"></span>
    <span class="dot dot-2"></span>
    <span class="dot dot-3"></span>
  </div>

  <!-- Main card -->
  <div class="card-wrapper">

    <!-- Top wave illustration -->
    <div class="illustration">
      <div class="astronaut">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- Helmet -->
          <ellipse cx="100" cy="72" rx="38" ry="40" fill="#ffffff" opacity="0.95"/>
          <ellipse cx="100" cy="72" rx="28" ry="28" fill="#d0e8ff" opacity="0.6"/>
          <ellipse cx="107" cy="65" rx="8" ry="6" fill="#ffffff" opacity="0.8"/>
          <!-- Body -->
          <ellipse cx="100" cy="128" rx="32" ry="36" fill="#ffffff" opacity="0.95"/>
          <!-- Arms -->
          <ellipse cx="62" cy="118" rx="12" ry="28" rx="14" fill="#ffffff" opacity="0.9" transform="rotate(-20 62 118)"/>
          <ellipse cx="138" cy="118" rx="12" ry="28" fill="#ffffff" opacity="0.9" transform="rotate(20 138 118)"/>
          <!-- Book -->
          <rect x="72" y="130" width="36" height="26" rx="3" fill="#ff6b9d" opacity="0.9"/>
          <rect x="72" y="130" width="18" height="26" rx="3" fill="#ff4081" opacity="0.9"/>
          <line x1="90" y1="130" x2="90" y2="156" stroke="#fff" stroke-width="1.5"/>
          <!-- Legs -->
          <ellipse cx="85" cy="162" rx="10" ry="18" fill="#ffffff" opacity="0.9" transform="rotate(10 85 162)"/>
          <ellipse cx="115" cy="162" rx="10" ry="18" fill="#ffffff" opacity="0.9" transform="rotate(-10 115 162)"/>
          <!-- Backpack -->
          <rect x="132" y="108" width="16" height="22" rx="4" fill="#e0e0e0" opacity="0.9"/>
        </svg>
      </div>

      <!-- Floating elements around astronaut -->
      <div class="float-el el-1">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#ffd700" stroke="#ffd700" stroke-width="1"/>
        </svg>
      </div>
      <div class="float-el el-2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#a78bfa">
          <circle cx="12" cy="12" r="10"/>
        </svg>
      </div>
      <div class="float-el el-3">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#60a5fa">
          <circle cx="12" cy="12" r="10"/>
        </svg>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <h1 class="error-code">404</h1>
      <h2 class="title">Oops ! Page introuvable</h2>
      <p class="subtitle">DÉSOLÉ, CETTE PAGE N'EXISTE PAS 🔍</p>
      <p class="description">
        L'URL que vous avez saisie n'existe pas ou vous n'avez pas les droits pour y accéder.<br>
        Contactez votre administrateur si vous pensez qu'il s'agit d'une erreur.
      </p>

      <div class="admin-notice">
        <div class="notice-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
          </svg>
        </div>
        <span>Contactez votre administrateur système pour obtenir l'accès</span>
      </div>

          <button class="btn-back" (click)="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Retour à l'accueil
      </button>
    </div>
  </div>

</div>
